project_name: recover_attention_project
stage: v0_nli_small
seed: 42

paths:
  raw_data: data/examples/questions_small.jsonl
  questions: data/processed/questions.jsonl
  candidate_spans: data/processed/candidate_spans.jsonl
  ablated_questions: data/processed/ablated_questions.jsonl
  masked_questions: data/processed/masked_questions.jsonl
  nli_scores: data/processed/nli_scores.jsonl
  log_dir: outputs/logs

candidate_extraction:
  enabled_types:
    - number
    - entity
    - operation
    - relation
    - question_target

ablation:
  enabled_types:
    - delete
    - generalize
    - mask
  mask_token: "[MASK]"

nli:
  backend: "stub_v0"
  language: "auto"
  real_backends:
    en:
      backend: "hf_nli_en_v0"
      model: "models/nli/en/roberta-large-mnli"
      model_id: "FacebookAI/roberta-large-mnli"
    zh:
      backend: "hf_nli_zh_v0"
      model: "models/nli/zh/mdeberta-v3-base-xnli"
      model_id: "MoritzLaurer/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7"
    auto:
      backend: "hf_nli_auto_v0"
      en_model: "models/nli/en/roberta-large-mnli"
      zh_model: "models/nli/zh/mdeberta-v3-base-xnli"
      en_model_id: "FacebookAI/roberta-large-mnli"
      zh_model_id: "MoritzLaurer/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7"
  allow_download: false
  device: "auto"
  batch_size: 4
  max_length: 512
  label_order: "auto"

recovery:
  backend: "oracle_stub_v0"
  real_backends:
    ollama:
      backend: "ollama_chat_v0"
      primary_model: "qwen3.5:9b"
      fallback_model: "llama3.1:8b"
      ollama_base_url: "http://localhost:11434"
      temperature: 0.0
      top_p: 1.0
      max_tokens: 128
      timeout: 120
      seed: 42
  num_samples: 1

real_downstream:
  output_dir: "outputs/logs/sprint_1N_real_downstream"
  nli:
    backend: "hf_nli_auto_v0"
    language: "auto"
    en_model: "models/nli/en/roberta-large-mnli"
    zh_model: "models/nli/zh/mdeberta-v3-base-xnli"
    allow_download: false
  semantic_labels:
    backend: "rule_v0"
    equivalent_threshold: 0.70
    directional_entailment_threshold: 0.50
    contradiction_threshold: 0.50
  masking:
    backend: "unit_mask_v0"
    mask_token: "[MASK]"
  recovery:
    backend: "ollama_chat_v0"
    model: "qwen3.5:9b"
    fallback_model: "llama3.1:8b"
    ollama_base_url: "http://localhost:11434"
    num_samples: 1
    temperature: 0.0
    top_p: 1.0
    max_tokens: 128
    timeout: 120
    seed: 42
  recover_scoring:
    backend: "stub_rule_v0"
  unit_evidence:
    backend: "aggregate_stub_v0"
  attention_anchor_labels:
    backend: "early_evidence_rule_stub_v0"
  intervention_manifest:
    intervention_type: "mask"
    backend: "manifest_stub_v0"

real_recovery_scoring:
  output_dir: "outputs/logs/sprint_1O_recovery_scoring"
  input_recover_outputs: "outputs/logs/sprint_1N_real_downstream/recover_outputs_real.jsonl"
  output_recover_scores: "outputs/logs/sprint_1O_recovery_scoring/recover_scores_nli_judge.jsonl"
  report_output: "outputs/logs/sprint_1O_recovery_scoring/recovery_scoring_report.json"
  score_backend: "nli_recovery_judge_v0"
  nli:
    backend: "hf_nli_auto_v0"
    language: "auto"
    en_model: "models/nli/en/roberta-large-mnli"
    zh_model: "models/nli/zh/mdeberta-v3-base-xnli"
    allow_download: false
    device: "auto"
    max_length: 512
    label_order: "auto"
  thresholds:
    recoverable_entailment_threshold: 0.70
    partial_entailment_threshold: 0.50
    contradiction_threshold: 0.50
