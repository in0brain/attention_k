规则:
- 本 hash 是冻结后 preregistration.md 内容的指纹。4D-2 脚本的 preflight(启动 gate G2)
  必须重算 preregistration.md 的 sha256 并与本值比对,不一致则停(防止跑后改判读规则/定义)。
- 冻结后不再改设计。若确需修改:先 bump version(v2.2…)、重算 hash、更新本文件,
  并在 preregistration 顶部记录变更;不得静默改动。
- 已冻结的判读常量:ε=0.02(AUROC 等价边界)、δ=0.15(rank-biserial,≈0.075 AUROC)、
  K=6(1 greedy + 5 sampled)、hidden block=⌊0.7L⌋(Qwen 19→tuple 20 / Llama 22→tuple 23)、
  RQ2 每层 pos/neg≥15、全体正例<30 → exploratory。

启动 Stage 0(2880 全量生成)仍需 G1(workshop CFP 确认)+ G2(本 hash 校验通过)
+ G3(≤20 prompt 真实 model-in-loop smoke 通过),三者齐备。
W0.5-B(实现 + smoke)不受 G1 阻塞。

G1 的具体判据(preflight 解析 docs/paper/cfp_record.json 的**内容**,不是看文件是否存在):
- status == "confirmed"
- deadline 非空字符串、archival 为 bool、page_limit 为正整数——§2 要求的三项事实齐全
任一缺失 → G1 不过,并报出缺哪一项。存在性检查会让空占位文件把 gate 刷绿,故不采用;
只改 status 而事实仍缺也不予通过。G1 是外部事实,不得由脚本/代理自行置位。
现状(2026-07-16):target=EIML3 @ NeurIPS 2026,deadline=2026-08-29 AoE,archival=false,
  page_limit 待 2026-07-29 投稿系统开放后确认 → status=provisional → G1 红。

backend invariant（2026-07-17 冻结;**不 bump version**,理由见下）:
- 两臂（MCQ 与 H1）必须使用**同一个推理后端**,当前 = 本地 8-bit
  (BitsAndBytesConfig(load_in_8bit=True) + device_map="auto" + attn_implementation="eager"
   + local_files_only=True)。8-bit 是被 H1 逼定的:4-bit 在 H1 长文本自由生成上标点退化
  (4D-1 已验证),故 MCQ 必须跟到 8-bit。
- 为什么是硬约束:§6 的 gate 是 D = S_MCQ − S_H1。量化改变 logits —— 实测 4C(4-bit) 与
  本管线(8-bit) 的 f5_label_margin 最大差 10.6(秩相关仍 0.86,说明读出位与 token 形式
  都对,只是数值被量化改了)。两臂 backend 不同 → S 之差分不清是 observability 差异
  还是量化差异 → gate 失去意义,§12 的结论不成立。
- 为什么不 bump v2.4:这是补一条**本该随 §6/§9 一起冻结却漏掉的前提**,不是改设计。
  它不改判读规则、不改样本、不改假设空间、不指向任何结论方向;它只让已冻结的比较**可解释**。
  §9 已固定"跨模型协议固定:同相对层深/同 pooling/同 position/同正则搜索/同 grouped split",
  本条同属该类协议不变量,只是当初漏写了量化。
- **由代码强制,不只写在本文件**:本 lock 不参与 sha256,散文会悄悄漂移。G3 校验逐键比对
  两臂 smoke report 的 backend 指纹,不一致 → G3 直接拿不到(见
  scripts/sprint_4D_2_conditional_increment.py::_check_backend_invariant)。
- 4C 的 F5 由 4-bit 算出,**不可复现也不应复现**;它们属 exploratory,已被 v2.3 排除。

G2 的强制语义:preflight 重算 hash,不一致 → 立即 SystemExit,不继续任何阶段。

G3 的具体判据(preflight 读 outputs/logs/sprint_4D_2_conditional_increment/
smoke_report.json,全部为真才算过):
- kind == "model_smoke"（无模型的 synthetic smoke 不计 G3:它没有真实 prompt、
  identifier 抽取、字符 span→token span、hidden pooling、cache record）
- passed == true
- schema_version == "4D2_completion_cache_v1"
- prereg_sha256 == 本文件记录的 hash
- hidden_verification.numeric_match == true（forward hook 与 hidden_states[block+1] 数值相等）
- 0 < n_prompts <= 20
